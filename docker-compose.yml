services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      # vendor и кэш в Linux-томах — на Windows bind mount даёт 5–10 с на запрос
      - vendor_data:/var/www/vendor
      - bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: url_shortener
      DB_USERNAME: url_shortener
      DB_PASSWORD: secret

  nginx:
    image: nginx:alpine
    container_name: url-shortener-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor:ro
      - bootstrap_cache:/var/www/bootstrap/cache:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: url-shortener-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: url_shortener
      MYSQL_USER: url_shortener
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  vendor_data:
  bootstrap_cache:
